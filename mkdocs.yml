site_name: VVMex Documentation
site_description: GPU-accelerated Vector Vorticity Model
site_author: GVVM Development Team
site_url: https://Aaron-Hsieh-0129.github.io/VVMex/
repo_url: https://github.com/Aaron-Hsieh-0129/VVMex
repo_name: VVMex
edit_uri: edit/main/docs/

plugins:
  - search

theme:
  name: material
  language: en
  features:
    - toc.integrate        
    - navigation.indexes   
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  font: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/video-gallery.css

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/video-gallery.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - User Guides:
      - Overview: user-guides/index.md
      - Environment Installation: user-guides/environment.md
      - Model Configuration: user-guides/configuration.md
      - I/O Management: user-guides/io-management.md
  - Developer Guides:
      - Overview: developer-guides/index.md
      - System Architecture: developer-guides/architecture.md
      - Physics Implementation: developer-guides/physics.md
      - P3 Modifications: developer-guides/p3-modifications.md
  - Examples:
      - Default cases: examples/default-cases.md
      - View gallery: examples/gallery.md
